name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  esphome-build:
    runs-on: ubuntu-latest
    name: ESPHome Build Test
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Compile test configuration
        run: |
          # Compile ESP8266 build
          echo "Building for ESP8266..."
          esphome compile tests/midea_xye.yaml

          # Compile ESP32 build
          echo "Building for ESP32..."
          esphome compile tests/midea_xye_esp32.yaml

  native-tests:
    runs-on: ubuntu-latest
    name: Native Unit Tests
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and run adapter unit tests
        run: |
          g++ -std=c++17 -Wall -DUSE_ARDUINO \
            -Itests/native/stubs -Iesphome/components/midea_xye \
            tests/native/test_get_climate_action.cpp \
            esphome/components/midea_xye/xye_adapter.cpp \
            -o "${RUNNER_TEMP}/xye_native_tests"
          "${RUNNER_TEMP}/xye_native_tests"

          g++ -std=c++17 -Wall -DUSE_ARDUINO \
            -Itests/native/stubs -Iesphome/components/midea_xye \
            tests/native/test_get_target_temperature.cpp \
            esphome/components/midea_xye/xye_adapter.cpp \
            -o "${RUNNER_TEMP}/xye_temp_tests"
          "${RUNNER_TEMP}/xye_temp_tests"
